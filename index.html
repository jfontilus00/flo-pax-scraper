<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PAX CRM Board</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">PAX</div>
      <div class="brandText">
        <div class="title">PAX CRM Board</div>
        <div class="subtitle">Installation lead management</div>
      </div>
    </div>

    <div class="searchWrap">
      <input id="search" class="search" placeholder="Search customer, postcode, PAX code, notes…" />
    </div>

    <div class="actions">
      <div class="viewToggle">
        <button class="viewBtn active" id="btnViewBoard">⬛ Board</button>
        <button class="viewBtn" id="btnViewTable">☰ Table</button>
      </div>
      <div class="btnGroup" style="position:relative">
        <button id="btnAdd" class="btn primary">+ New lead</button>
        <button id="btnAddTpl" class="btn primary tplArrow" title="From template">▾</button>
        <div class="tplMenu hidden" id="tplMenu"></div>
      </div>
      <button id="btnExport" class="btn">Export</button>
      <label class="btn file">Import<input id="fileImport" type="file" accept="application/json" /></label>
      <button id="btnSettings" class="btn">⚙ Settings</button>
      <button id="btnReset" class="btn danger">Reset</button>
    </div>
  </header>

  <div class="statsBar" id="statsBar"></div>

  <main class="layout" id="layout">
    <section class="boardWrap" id="boardWrap">
      <section class="board" id="board"></section>
    </section>

    <div class="tableWrap hidden" id="tableWrap">
      <div class="tableScroll">
        <table class="dataTable" id="dataTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <aside class="drawer hidden" id="drawer">
      <div class="drawerHead">
        <div>
          <div class="drawerTitle">Lead details</div>
          <div class="drawerSub" id="drawerSub">Select a card</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="iconBtn" id="btnPrevCard" title="Previous">←</button>
          <button class="iconBtn" id="btnNextCard" title="Next">→</button>
          <button class="iconBtn" id="btnCloseDrawer">✕</button>
        </div>
      </div>
      <div class="drawerTabs" id="drawerTabs">
        <button class="drawerTab active" data-tab="details">Details</button>
        <button class="drawerTab" data-tab="items">Items</button>
        <button class="drawerTab" data-tab="activity">Activity</button>
      </div>
      <div class="drawerBody" id="drawerBody"></div>
    </aside>
  </main>

  <template id="cardTpl">
    <article class="card" tabindex="0" draggable="true">
      <div class="cardTopRow">
        <div class="accentDot"></div>
        <input class="customer" placeholder="Customer name" />
        <div class="cardTopRight">
          <div class="priorityBadge"></div>
          <div class="notesDot hidden" title="Has notes">●</div>
        </div>
      </div>
      <div class="cardStatusRow">
        <div class="statusChip"></div>
        <div class="depositChip hidden"></div>
        <div class="overduePill hidden">⚠ Overdue</div>
      </div>
      <div class="fields"></div>
      <div class="meta hidden">
        <div><span class="k">IKEA</span><span class="v total"></span></div>
        <div><span class="k">Budget</span><span class="v budgetV"></span></div>
        <div><span class="k">Items</span><span class="v count"></span></div>
      </div>
      <div class="cardBtns">
        <button class="btn mini primary fetch">⚡ Fetch</button>
        <button class="btn mini open">Open →</button>
      </div>
      <div class="error hidden"></div>
    </article>
  </template>

  <div class="modal hidden" id="settingsModal" role="dialog" aria-modal="true">
    <div class="modalCard wide">
      <div class="modalHead">
        <div class="modalTitle">⚙ Settings</div>
        <button class="iconBtn" id="btnCloseSettings">✕</button>
      </div>
      <div class="modalTabs" id="modalTabs">
        <button class="modalTab active" data-mtab="general">General</button>
        <button class="modalTab" data-mtab="columns">Columns</button>
        <button class="modalTab" data-mtab="fields">Fields</button>
        <button class="modalTab" data-mtab="custom">Custom fields</button>
        <button class="modalTab" data-mtab="templates">Templates</button>
      </div>
      <div class="modalBody" id="modalBody"></div>
      <div class="modalFoot">
        <button class="btn" id="btnCancelSettings">Cancel</button>
        <button class="btn primary" id="btnSaveSettings">Save settings</button>
      </div>
    </div>
  </div>

  <div class="lightbox hidden" id="lightbox">
    <div class="lightboxInner" id="lightboxInner">
      <button class="lightboxClose" id="lightboxClose">✕</button>
      <img id="lightboxImg" src="" alt="" />
      <div class="lightboxCaption" id="lightboxCaption"></div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
